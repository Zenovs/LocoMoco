# ── pnpm 11 Supply-Chain-Defaults für diese App entschärfen ───────────────────
# Diese App pinnt bewusst aktuelle Next.js-Releases und aktualisiert sich bei
# jedem Start per git pull. Die strengen pnpm-11-Defaults würden den Install
# direkt nach einem Dependency-Bump blockieren. In pnpm 11 leben diese Settings
# in dieser Datei (nicht mehr in .npmrc).

# 1) Kein ~24h-Cooldown auf frisch veröffentlichte Pakete
#    (sonst: ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION)
minimumReleaseAge: 0

# 2) Build-Scripts dieser Pakete explizit freigeben (true/false ist Pflicht in
#    pnpm 11; ohne das bleiben sie "ignored" und der Install bricht ab)
allowBuilds:
  sharp: true
  unrs-resolver: true

# 3) Kein verschachtelter Verify-Install vor "pnpm <script>"
#    (sonst würde "pnpm build" daran scheitern)
verifyDepsBeforeRun: false
