# Auto-Deploy bei Push auf main.
# Läuft auf einem self-hosted Runner AUF dem Ubuntu-Server (Label: locomoco).
# Der Runner fragt GitHub nur AUSGEHEND ab -> keine offenen Ports nötig (LAN-only ok).
name: Deploy (intern)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, locomoco]
    concurrency:
      group: locomoco-deploy
      cancel-in-progress: true
    steps:
      - name: Deploy auf den internen Server
        run: /opt/locomoco/deploy.sh
