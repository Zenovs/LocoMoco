# Auto-Deploy bei Push auf main.
# Läuft auf einem self-hosted Runner AUF dem Ubuntu-Server (Label: locomoco).
# Der Runner fragt GitHub nur AUSGEHEND ab -> keine offenen Ports nötig (LAN-only ok).
name: Deploy (intern)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, locomoco]
    concurrency:
      group: locomoco-deploy
      cancel-in-progress: true
    steps:
      # Die mitversionierte deploy.sh aus dem Repo ausführen (sie macht selbst
      # git reset/build/restart). So sind Deploy-Änderungen immer aktuell, ohne
      # dass man /opt/locomoco/deploy.sh manuell nachkopieren muss.
      - name: Deploy auf den internen Server
        run: bash /opt/locomoco/app/deploy/deploy.sh
